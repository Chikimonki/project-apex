name: Build and Deploy APEX

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Zig
      uses: goto-bus-stop/setup-zig@v2
      with:
        version: 0.13.0
    
    - name: Install LuaJIT
      run: |
        sudo apt-get update
        sudo apt-get install -y luajit libluajit-5.1-dev
    
    - name: Build CAN Decoder
      run: |
        cd src/core
        zig build-lib can_decoder.zig -dynamic -O ReleaseFast -femit-bin=libcan_decoder.so
        ls -lh libcan_decoder.so
    
    - name: Build Kalman Filter
      run: |
        cd src/core
        zig build-lib kalman_filter.zig -dynamic -O ReleaseFast -femit-bin=libkalman.so
        ls -lh libkalman.so
    
    - name: Run Tests
      run: |
        cd src/core
        zig build-exe can_decoder_test.zig -O ReleaseFast -femit-bin=test_can
        ./test_can
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: apex-libraries
        path: |
          src/core/*.so
          src/core/test_can

  docker:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t apex-telemetry:latest .
    
    - name: Test Docker image
      run: |
        docker run -d -p 8082:8082 apex-telemetry:latest
        sleep 10
        curl -f http://localhost:8082/telemetry || exit 1
    
    - name: Login to GitHub Container Registry
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Push to GHCR
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        docker tag apex-telemetry:latest ghcr.io/${{ github.repository_owner }}/apex-telemetry:latest
        docker push ghcr.io/${{ github.repository_owner }}/apex-telemetry:latest

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: apex-libraries
        path: src/core/
    
    - name: Install LuaJIT
      run: |
        sudo apt-get update
        sudo apt-get install -y luajit libluajit-5.1-dev luarocks
        sudo luarocks install lua-cjson
    
    - name: Run benchmarks
      run: |
        cd benchmarks
        chmod +x ../src/core/*.so
        # Simple benchmark without full F1 data
        echo "Benchmark placeholder - full benchmarks need F1 data"
